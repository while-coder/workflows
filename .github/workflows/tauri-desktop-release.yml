name: Tauri Desktop Release

on:
  workflow_call:
    inputs:
      project-path:
        required: true
        type: string
      cargo-lock-path:
        required: true
        type: string
      cargo-target-path:
        required: true
        type: string
      cache-key-prefix:
        required: false
        type: string
        default: cargo-app
      tag-name:
        required: true
        type: string
      release-name:
        required: true
        type: string
      release-body:
        required: false
        type: string
        default: ''
      release-draft:
        required: false
        type: boolean
        default: false
      prerelease:
        required: false
        type: boolean
        default: false
      include-updater-json:
        required: false
        type: boolean
        default: false
      matrix-json:
        required: false
        type: string
        default: >-
          [{"platform":"macos-latest","args":"--target aarch64-apple-darwin","rust-target":"aarch64-apple-darwin"},{"platform":"macos-latest","args":"--target x86_64-apple-darwin","rust-target":"x86_64-apple-darwin"},{"platform":"ubuntu-22.04","args":"","rust-target":""},{"platform":"windows-latest","args":"","rust-target":""},{"platform":"windows-latest","args":"--target aarch64-pc-windows-msvc","rust-target":"aarch64-pc-windows-msvc"}]
      linux-packages:
        required: false
        type: string
        default: libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      node-version:
        required: false
        type: string
        default: '24'
      pnpm-version:
        required: false
        type: string
        default: 10.33.0

jobs:
  release-desktop:
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(inputs.matrix-json) }}
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ inputs.pnpm-version }}

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ${{ inputs.cargo-target-path }}
          key: ${{ matrix.platform }}-${{ matrix.rust-target || 'default' }}-${{ inputs.cache-key-prefix }}-${{ hashFiles(inputs.cargo-lock-path) }}
          restore-keys: |
            ${{ matrix.platform }}-${{ matrix.rust-target || 'default' }}-${{ inputs.cache-key-prefix }}-
            ${{ matrix.platform }}-${{ inputs.cache-key-prefix }}-

      - name: Install Linux deps
        if: startsWith(matrix.platform, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ inputs.linux-packages }}

      - run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: ${{ inputs.project-path }}
          tagName: ${{ inputs.tag-name }}
          releaseName: ${{ inputs.release-name }}
          releaseBody: ${{ inputs.release-body }}
          releaseDraft: ${{ inputs.release-draft }}
          prerelease: ${{ inputs.prerelease }}
          includeUpdaterJson: ${{ inputs.include-updater-json }}
          args: ${{ matrix.args }}
