name: Tauri iOS Unsigned IPA

on:
  workflow_call:
    inputs:
      project-path:
        required: true
        type: string
      cargo-lock-path:
        required: true
        type: string
      cargo-target-path:
        required: true
        type: string
      tag-name:
        required: true
        type: string
      version:
        required: true
        type: string
      asset-prefix:
        required: true
        type: string
      release-repository:
        required: false
        type: string
        default: ''
      init-command:
        required: false
        type: string
        default: ''
      build-command:
        required: true
        type: string

jobs:
  release-ios:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Select Xcode
        shell: bash
        run: |
          if [ -d "/Applications/Xcode_16.3.app/Contents/Developer" ]; then
            export DEVELOPER_DIR="/Applications/Xcode_16.3.app/Contents/Developer"
            echo "DEVELOPER_DIR=$DEVELOPER_DIR" >> "$GITHUB_ENV"
          fi
          xcodebuild -version

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ${{ inputs.cargo-target-path }}
          key: ios-cargo-${{ hashFiles(inputs.cargo-lock-path) }}
          restore-keys: |
            ios-cargo-

      - run: pnpm install --frozen-lockfile

      - name: Init iOS project
        if: inputs.init-command != ''
        working-directory: ${{ inputs.project-path }}
        shell: bash
        run: ${{ inputs.init-command }}

      - name: Build unsigned IPA
        working-directory: ${{ inputs.project-path }}
        shell: bash
        run: ${{ inputs.build-command }}

      - name: Upload unsigned IPA to release
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          RELEASE_REPOSITORY: ${{ inputs.release-repository || github.repository }}
          TAG: ${{ inputs.tag-name }}
          VERSION: ${{ inputs.version }}
          ASSET_PREFIX: ${{ inputs.asset-prefix }}
          PROJECT_PATH: ${{ inputs.project-path }}
        shell: bash
        run: |
          set -euo pipefail
          IPA=$(find "$PROJECT_PATH/src-tauri/gen/apple" -name '*.ipa' -type f | head -n1)
          if [ -z "$IPA" ]; then
            echo "::error::Unsigned iOS IPA was not found."
            find "$PROJECT_PATH/src-tauri/gen/apple" -maxdepth 5 \( -type f -o -type d \) || true
            exit 1
          fi
          DEST="${ASSET_PREFIX}_${VERSION}_ios_unsigned.ipa"
          cp "$IPA" "$DEST"
          gh release upload "$TAG" "$DEST" -R "$RELEASE_REPOSITORY" --clobber
